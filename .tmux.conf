set-option -g default-command "zsh -i"
set -g default-terminal "screen-256color"

# Enable focus events for better integration with editors like Neovim
set-option -g focus-events on

# Enable true color (RGB) support for terminals that support it
set-option -a terminal-features 'xterm-256color:RGB'

# To get in to prefix mode, press Ctrl + a
# prefix mode is used to send commands to tmux
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Use Ctrl + a and then | to split the window vertically
unbind %
bind | split-window -h

# Use Ctrl + a and then - to split the window horizontally
unbind '"'
bind - split-window -v

# Use Ctrl + a and then r to reload the config file 
unbind r
bind r source-file ~/.tmux.conf

# Use Ctrl + a and then h,j,k,l to resize the panes 
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

# Use Ctrl + a and then m to maximize the screen
bind -r m resize-pane -Z

set -g mouse on

# Use Ctrl + a and then [ to enter copy mode
# then you can act like vim
set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection


# Vim-style pane navigation
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Optional: Smart pane switching with awareness of Vim splits
# This prevents conflicts when using Vim inside tmux
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# tmp plugin
set -g @plugin 'tmux-plugins/tpm'

# list of tmux plugins
set -g @plugin "arcticicestudio/nord-tmux"
set -g @plugin 'xamut/tmux-weather'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes

set -g status-right-length 200

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Override status-right AFTER plugins load so nord-tmux doesn't override it
set -g status-right '#{weather} | CPU: #{cpu_fg_color}#{cpu_icon} #{cpu_percentage}#[fg=default] | RAM: #{ram_fg_color}#{ram_icon} #{ram_percentage}#[fg=default] | %a %h-%d %H:%M '

# Re-run plugins so they substitute their placeholders into the new status-right
run-shell '~/.tmux/plugins/tmux-cpu/cpu.tmux'
run-shell '~/.tmux/plugins/tmux-weather/tmux-weather.tmux'
